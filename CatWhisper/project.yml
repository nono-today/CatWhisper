name: CatWhisper
options:
  bundleIdPrefix: com.cat
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  qwen3-asr-swift:
    url: https://github.com/ivan-digital/qwen3-asr-swift
    revision: ba91e9e23af90afdf4323e85c0583d82a5acaabc
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.30.0"

targets:
  CatWhisper:
    type: application
    platform: macOS
    sources:
      - path: Sources/CatWhisper
    resources:
      - path: Sources/CatWhisper/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cat.whisper
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CatWhisper.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: 766AZHGT3J
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: qwen3-asr-swift
        product: Qwen3ASR
      - package: qwen3-asr-swift
        product: Qwen3Common
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSMicrophoneUsageDescription: "CatWhisper 需要麥克風權限來錄製語音，以進行語音辨識轉文字。"
        CFBundleIconFile: AppIcon
